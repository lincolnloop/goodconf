[tox]
requires =
    tox>=4.22
    tox-uv>=1.16
env_list =
    py3{10,11}-django52
    py3{12,13,14}-django60
    dev
    mypy

# Generational stacks: the Django 5.2 line runs on the Pythons it supports
# (3.10-3.13) with the *lowest* allowed dependencies (pydantic 2.7, etc.); the
# Django 6.0 line runs on 3.12-3.14 with the *latest* dependencies. uv.lock and
# mypy round it out.
[testenv]
runner = uv-venv-runner
dependency_groups = dev
deps =
    django52: django>=5.2,<5.3
    django60: django>=6.0,<6.1
uv_resolution =
    django52: lowest-direct
    django60: highest
commands = pytest {posargs}

[testenv:dev]
# The standard development environment, pinned by the committed uv.lock.
runner = uv-venv-lock-runner
commands = pytest {posargs}

[testenv:mypy]
# Strict mypy against the dev environment (latest deps).
commands = mypy .
